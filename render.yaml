services:
  - type: web
    name: visual-search
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.8
      - key: PORT
        value: 10000
      - key: WOOCOMMERCE_BASE_URL
        sync: false
      - key: WOOCOMMERCE_CONSUMER_KEY
        sync: false
      - key: WOOCOMMERCE_CONSUMER_SECRET
        sync: false
      - key: API_KEY
        generateValue: true
      - key: RENDER
        value: true
    autoDeploy: true
