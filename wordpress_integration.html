<!-- Visual Search Integration -->
<div class="visual-search-container" style="max-width: 1200px; margin: 20px auto; padding: 20px; font-family: Arial, sans-serif;">
    <!-- File Upload Section -->
    <div class="upload-section" style="text-align: center; margin-bottom: 30px;">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()" style="background-color: #2271b1; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px;">
            Choisir une image
        </button>
        <button id="cameraButton" style="background-color: #2271b1; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer;">
            Prendre une photo
        </button>
    </div>

    <!-- Category Filter -->
    <div class="filter-section" style="text-align: center; margin-bottom: 20px;">
        <select id="categoryFilter" style="padding: 8px; border-radius: 4px; border: 1px solid #ddd; min-width: 200px;">
            <option value="">Toutes les catégories</option>
        </select>
    </div>

    <!-- Camera Interface -->
    <div class="camera-container" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; z-index: 1000;">
        <video class="camera-preview" autoplay playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
        <div class="camera-buttons" style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;">
            <button class="capture-btn" style="background: #2271b1; color: white; padding: 12px 24px; border: none; border-radius: 4px; margin: 0 10px; cursor: pointer;">
                Prendre une photo
            </button>
            <button class="cancel-btn" style="background: #dc3232; color: white; padding: 12px 24px; border: none; border-radius: 4px; margin: 0 10px; cursor: pointer;">
                Annuler
            </button>
        </div>
    </div>

    <!-- Loading and Results -->
    <div class="loading" style="display: none; text-align: center; margin: 20px 0;">
        <div style="display: inline-block; width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #2271b1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div class="error" style="display: none; color: #dc3232; text-align: center; padding: 10px; margin: 10px 0; background: #ffeaea; border-radius: 4px;"></div>
    
    <div class="no-results" style="display: none; text-align: center; padding: 20px; color: #666;">
        Aucun résultat trouvé
    </div>

    <div class="results" style="display: none; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px 0;">
        <!-- Results will be populated here -->
    </div>
</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.result-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s;
}

.result-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.result-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.result-item .product-info {
    padding: 15px;
}

.result-item h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #333;
}

.result-item .price {
    font-weight: bold;
    color: #2271b1;
    margin: 5px 0;
}

.result-item .similarity {
    color: #666;
    font-size: 14px;
}

.result-item a {
    text-decoration: none;
    color: inherit;
}
</style>

<script>
(function() {
    // Configuration
    const API_ENDPOINT = 'http://localhost:59106';
    const API_KEY = 'YOUR_API_KEY'; // Replace with your actual API key from api_key.txt

    // Elements
    const fileInput = document.getElementById('fileInput');
    const cameraButton = document.getElementById('cameraButton');
    const resultsDiv = document.querySelector('.results');
    const loadingDiv = document.querySelector('.loading');
    const errorDiv = document.querySelector('.error');
    const noResultsDiv = document.querySelector('.no-results');
    const categoryFilter = document.getElementById('categoryFilter');
    const cameraContainer = document.querySelector('.camera-container');
    const cameraPreview = document.querySelector('.camera-preview');
    const captureBtn = document.querySelector('.capture-btn');
    const cancelBtn = document.querySelector('.cancel-btn');
    
    let stream = null;
    let categories = new Set();

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        cameraContainer.style.display = 'none';
    }

    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    async function searchProducts(file) {
        try {
            const formData = new FormData();
            formData.append('file', file);
            
            if (categoryFilter.value) {
                formData.append('category', categoryFilter.value);
            }
            
            loadingDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            noResultsDiv.style.display = 'none';
            
            const response = await fetch(`${API_ENDPOINT}/search`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: formData
            });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                resultsDiv.innerHTML = data.results.map(result => `
                    <div class="result-item">
                        <a href="${result.product_url}" target="_blank">
                            <img src="${result.image_path}" alt="${result.name}">
                            <div class="product-info">
                                <h3>${result.name}</h3>
                                <p class="price">${result.price}€</p>
                                <p class="similarity">${Math.round(result.similarity * 100)}% similar</p>
                            </div>
                        </a>
                    </div>
                `).join('');
                resultsDiv.style.display = 'grid';
                noResultsDiv.style.display = 'none';
            } else {
                resultsDiv.style.display = 'none';
                noResultsDiv.style.display = 'block';
            }
        } catch (error) {
            showError('Error processing search request');
            console.error('Error:', error);
        } finally {
            loadingDiv.style.display = 'none';
        }
    }

    // File input handler
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            searchProducts(e.target.files[0]);
        }
    });

    // Camera handlers
    cameraButton.addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                } 
            });
            
            cameraPreview.srcObject = stream;
            cameraContainer.style.display = 'flex';
        } catch (error) {
            showError('Impossible d\'accéder à la caméra. Vérifiez que vous avez donné les permissions nécessaires.');
        }
    });

    captureBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = cameraPreview.videoWidth;
        canvas.height = cameraPreview.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(cameraPreview, 0, 0);
        
        canvas.toBlob(blob => {
            const file = new File([blob], "camera-photo.jpg", { type: "image/jpeg" });
            searchProducts(file);
            stopCamera();
        }, 'image/jpeg', 0.9);
    });

    cancelBtn.addEventListener('click', stopCamera);

    // Clean up camera when leaving page
    window.addEventListener('beforeunload', stopCamera);

    // Check initial status
    fetch(`${API_ENDPOINT}/status`, {
        headers: {
            'Authorization': `Bearer ${API_KEY}`
        }
    })
        .then(response => response.json())
        .then(data => {
            if (!data.ready) {
                showError(`Loading products... (${data.product_count} loaded)`);
            }
        })
        .catch(error => {
            console.error('Error checking status:', error);
            showError('Error checking server status');
        });
})();
</script>
